<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>옥구초 성적 조회</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#FBFCFB; --ink:#15211A; --green:#1C5C3C; --green-soft:#EAF2EC;
    --line:#E7ECE8; --line2:#EFF2F0; --muted:#9AA39E; --muted2:#79827C;
    --clay:#B4503C; --clay-soft:#FBEDE9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;
    touch-action:manipulation;
  }
  button{font-family:inherit;}
  .wrap{max-width:460px;margin:0 auto;min-height:100%;min-height:100dvh;display:flex;flex-direction:column;
        padding-top:env(safe-area-inset-top);}
  .view{flex:1;display:flex;flex-direction:column;animation:fade .34s cubic-bezier(.2,.8,.2,1);}
  @media (prefers-reduced-motion: no-preference){@keyframes fade{from{transform:translateY(12px);}to{transform:none;}}}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}
  .pad{padding:18px 26px 24px;}
  .centerpad{display:flex;flex-direction:column;min-height:100%;}
  .centermain{flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:24px;}

  .brandrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0 4px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .mark{width:30px;height:30px;border-radius:9px;background:var(--green);display:grid;place-items:center;}
  .brand b{font-size:13px;font-weight:800;letter-spacing:-.01em;white-space:nowrap;}
  .kicker{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  .backbtn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:0;font-weight:800;font-size:13px;color:var(--ink);}

  h1.title{font-size:30px;font-weight:800;letter-spacing:-.035em;line-height:1.2;margin:0 0 28px;}

  .tabs{display:flex;border-bottom:1.5px solid var(--line);margin-bottom:30px;}
  .tab{flex:1;padding:0 0 13px;background:none;border:none;cursor:pointer;font-size:15px;font-weight:700;
       color:var(--muted);position:relative;letter-spacing:-.01em;white-space:nowrap;}
  .tab .ink{position:absolute;left:0;right:0;bottom:-1.5px;height:2.5px;background:var(--green);border-radius:2px;
            transform:scaleX(0);transition:transform .28s cubic-bezier(.2,.8,.2,1);}
  .tab.on{color:var(--ink);}
  .tab.on .ink{transform:scaleX(1);}

  .field{margin-bottom:28px;}
  .flabel{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:11px;}

  .selectfield{position:relative;}
  .selectfield select{appearance:none;-webkit-appearance:none;width:100%;background:none;border:none;
       border-bottom:1.5px solid var(--line);padding:6px 30px 12px 2px;font-family:inherit;font-size:18px;
       font-weight:600;color:var(--ink);outline:none;border-radius:0;transition:border-color .2s;}
  .selectfield select:focus{border-color:var(--green);}
  .selectfield.ph select{color:#BCC3BE;font-weight:500;}
  .selectfield .chev{position:absolute;right:2px;top:7px;pointer-events:none;}

  .code{display:flex;gap:12px;margin-bottom:20px;}
  .cell{flex:1;height:60px;border-bottom:2px solid var(--line);display:flex;align-items:center;justify-content:center;
        font-size:34px;line-height:1;color:var(--green);transition:border-color .2s;}
  .cell.filled{border-color:var(--green);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 10px;max-width:320px;margin:0 auto;width:100%;}
  .key{height:54px;border:none;background:none;font-size:24px;font-weight:600;color:var(--ink);border-radius:14px;
       cursor:pointer;transition:background .12s,transform .08s;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  .key:active{background:var(--green-soft);transform:scale(.96);}
  .kdel{font-size:21px;color:var(--muted2);}
  .key-empty{pointer-events:none;}

  .footer{padding:14px 26px calc(20px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 72%,rgba(251,252,251,0));}
  .btn{width:100%;border:none;cursor:pointer;font-weight:700;font-size:16px;padding:17px;border-radius:15px;
       transition:transform .12s,opacity .2s,background .2s;letter-spacing:-.01em;display:flex;align-items:center;
       justify-content:center;gap:9px;white-space:nowrap;}
  .btn:active{transform:scale(.985);}
  .btn-pri{background:var(--green);color:#fff;}
  .btn-pri:disabled{background:#D6DDD8;color:#fff;cursor:default;}
  .btn-ghost{background:none;border:1.5px solid var(--line);color:var(--ink);}

  .res-kicker{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .res-name{font-size:21px;font-weight:800;letter-spacing:-.03em;margin:0 0 22px;}
  .scorewrap{display:flex;align-items:flex-end;gap:10px;margin-bottom:6px;min-height:96px;}
  .score{font-size:104px;font-weight:800;letter-spacing:-.06em;line-height:.82;color:var(--ink);white-space:nowrap;}
  .score .u{font-size:30px;font-weight:700;color:var(--green);letter-spacing:-.03em;}
  .scoretag{display:inline-block;font-size:13px;font-weight:700;padding:6px 13px;border-radius:999px;white-space:nowrap;}
  .rule{height:1.5px;background:var(--line);margin:26px 0;}
  .meta{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line2);}
  .meta .k{font-size:14px;color:var(--muted2);white-space:nowrap;}
  .meta .v{font-size:15px;font-weight:700;white-space:nowrap;}

  .wrong-h{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--clay);
           margin:26px 0 14px;display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .wrong-h .dot{width:6px;height:6px;border-radius:9px;background:var(--clay);display:inline-block;}
  .witem{display:flex;gap:13px;padding:16px 0;border-top:1px solid var(--line2);}
  .witem:last-child{border-bottom:1px solid var(--line2);}
  .wnum{flex:0 0 auto;width:22px;height:22px;border-radius:7px;background:var(--clay-soft);color:var(--clay);
        font-size:12px;font-weight:800;display:grid;place-items:center;margin-top:2px;}
  .wtext{font-size:15.5px;font-weight:600;line-height:1.55;color:#2B342E;letter-spacing:-.01em;word-break:keep-all;}
  .wbody{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px;}
  .wrow{display:flex;gap:11px;align-items:baseline;}
  .wtag{flex:0 0 46px;font-size:10px;font-weight:800;letter-spacing:.02em;padding-top:3px;white-space:nowrap;}
  .wrow.wrong .wtag{color:var(--clay);}
  .wrow.right .wtag{color:var(--green);}
  .wsent{font-size:15.5px;line-height:1.55;font-weight:600;color:#2B342E;letter-spacing:-.01em;word-break:keep-all;}
  .bad-mine{color:var(--clay);text-decoration:line-through;text-decoration-thickness:1.5px;text-decoration-color:rgba(180,80,60,.55);}
  .bad-correct{color:var(--green);background:var(--green-soft);border-radius:5px;padding:1px 5px;font-weight:800;}
  .miss{display:inline-block;width:2px;height:14px;background:var(--clay);border-radius:1px;vertical-align:-2px;}

  .cheer{display:flex;gap:13px;align-items:center;background:var(--green-soft);border-radius:18px;padding:18px;margin-top:8px;}
  .cheer .ic{flex:0 0 auto;width:42px;height:42px;border-radius:12px;background:#fff;display:grid;place-items:center;}
  .cheer .t b{display:block;font-size:15px;font-weight:800;color:var(--green);letter-spacing:-.02em;}
  .cheer .t span{font-size:13px;color:#5E7A68;}

  .push{margin-top:30px;padding:22px;border:1.5px solid var(--line);border-radius:20px;background:#fff;}
  .push-top{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
  .push-ic{width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line);display:grid;place-items:center;flex:0 0 auto;transition:.3s;}
  .push-ic.on{background:var(--green);border-color:var(--green);}
  .push-top b{font-size:15.5px;font-weight:800;letter-spacing:-.02em;display:block;white-space:nowrap;}
  .push-top span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
  .push-desc{font-size:13.5px;line-height:1.65;color:var(--muted2);margin:0 0 18px;letter-spacing:-.01em;word-break:keep-all;}
  .push-actions{display:flex;flex-direction:column;gap:10px;}
  .push-btn{width:100%;border:none;cursor:pointer;font-weight:700;font-size:14.5px;padding:14px;border-radius:13px;
            transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;}

  .note{margin-top:8px;padding:16px;border-radius:14px;background:#FAFAF8;border:1px solid var(--line);
        font-size:13.5px;line-height:1.6;color:var(--muted2);word-break:keep-all;}
  .redolog{margin-top:28px;border:1.5px solid var(--line);border-radius:18px;overflow:hidden;}
  .redolog-h{padding:14px 18px;background:#FAFBFA;border-bottom:1px solid var(--line2);display:flex;
             align-items:center;justify-content:space-between;font-size:12.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
  .redolog-h .sum{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0;}
  .redorow{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;}
  .redorow+.redorow{border-top:1px solid var(--line2);}
  .redodate{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
  .redodate small{color:var(--muted);font-weight:600;margin-left:7px;font-size:12px;}
  .redochip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap;}
  .redochip.done{background:var(--green-soft);color:var(--green);}
  .redochip.todo{background:#FBF1E6;color:#B0792E;}
  .datefield{margin-bottom:24px;}
  .redo-status{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:14px 16px;border:1.5px solid var(--line);border-radius:14px;}
  .redolabel{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;white-space:nowrap;}

  .toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
         background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:13px 20px;border-radius:13px;
         box-shadow:0 14px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.3s;z-index:80;
         display:flex;align-items:center;gap:9px;white-space:nowrap;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hidden{display:none !important;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;
        border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ LOGIN ============ -->
  <div id="loginView" class="view">
    <div class="scroll"><div class="pad centerpad">
      <div class="brandrow">
        <div class="brand"><div class="mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 19c0-7 5-12.5 14-13.5C19.7 14 14.5 19.7 5 19Z" fill="#fff"/><path d="M8 17c2.3-3.6 5-6 8-7.5" stroke="#1C5C3C" stroke-width="1.3" stroke-linecap="round" opacity=".5"/></svg>
        </div><b>옥구초등학교</b></div>
        <span class="kicker">성적 조회</span>
      </div>
      <div class="centermain">
        <h1 class="title">우리 아이<br>성적 확인하기</h1>
        <div class="field">
          <div class="flabel">이름</div>
          <div class="selectfield ph" id="nameField">
            <select id="studentName"><option value="">명단 로딩 중...</option></select>
            <span class="chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#BCC3BE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
          </div>
        </div>
        <div class="field" style="margin-bottom:0;">
          <div class="flabel">확인코드</div>
          <div class="code" id="codeDots"></div>
          <div class="keypad" id="keypad"></div>
        </div>
      </div>
    </div></div>
    <div class="footer">
      <button id="loginBtn" class="btn btn-pri" type="button" disabled>성적 확인하기</button>
    </div>
  </div>

  <!-- ============ SETUP (first login) ============ -->
  <div id="setupView" class="view hidden">
    <div class="scroll"><div class="pad centerpad">
      <div class="brandrow">
        <button class="backbtn" type="button" onclick="goHome()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#15211A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>뒤로
        </button>
        <span class="kicker">최초 1회 설정</span>
      </div>
      <div class="centermain">
        <h1 class="title">나만의<br>확인코드 만들기</h1>
        <p class="push-desc" style="margin:0 0 30px;">다음부터 내 성적을 안전하게 보려면, 숫자 코드를 새로 정해 주세요. 코드는 나만 알고 있어야 해요.</p>
        <div class="field" style="margin-bottom:0;">
          <div class="flabel">새 확인코드</div>
          <div class="code" id="newCodeDots"></div>
          <div class="keypad" id="newKeypad"></div>
        </div>
      </div>
    </div></div>
    <div class="footer">
      <button id="setupBtn" class="btn btn-pri" type="button" disabled>설정 완료 · 결과 보기</button>
    </div>
  </div>

  <!-- ============ RESULT ============ -->
  <div id="resultView" class="view hidden">
    <div class="scroll"><div class="pad">
      <div class="brandrow" style="padding-bottom:18px;">
        <div class="brand"><div class="mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 19c0-7 5-12.5 14-13.5C19.7 14 14.5 19.7 5 19Z" fill="#fff"/><path d="M8 17c2.3-3.6 5-6 8-7.5" stroke="#1C5C3C" stroke-width="1.3" stroke-linecap="round" opacity=".5"/></svg>
        </div><b>옥구초등학교</b></div>
        <span class="kicker">성적 조회</span>
      </div>
      <h2 class="res-name" id="resName"></h2>
      <div class="tabs" id="resultTabs">
        <button class="tab on" data-tab="exam1" type="button">영어 시험<span class="ink"></span></button>
        <button class="tab" data-tab="exam2" type="button">받아쓰기<span class="ink"></span></button>
      </div>
      <div id="resultBody"></div>

      <div class="push">
        <div class="push-top">
          <div class="push-ic" id="pushIc">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1C5C3C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>
          </div>
          <div><b>학부모 푸시 알림</b><span id="pushStatus">아직 꺼져 있어요</span></div>
        </div>
        <p class="push-desc">이 기기에서 한 번만 알림을 켜두면, 성적이 등록되거나 수정될 때 학부모님께 바로 알림을 보내드려요.</p>
        <div class="push-actions">
          <button id="pushEnableBtn" class="push-btn" style="background:var(--green);color:#fff;" type="button" onclick="enableLoggedInParentScorePush()">알림 켜기</button>
          <button class="push-btn" style="background:none;border:1.5px solid var(--line);color:var(--ink);" type="button" onclick="testLoggedInParentScorePush()">테스트 알림 보내기</button>
        </div>
      </div>

      <button class="btn btn-ghost" style="margin-top:18px;" type="button" onclick="goHome()">홈으로 돌아가기</button>
    </div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   상태
========================================================= */
var currentTab = 'exam1';      // 로그인 화면의 시험 탭
var resultTab  = 'exam1';      // 결과 화면의 시험 탭
var sessionIdx = 0;            // 선택한 시험(날짜) 인덱스
var code = '';                 // 로그인 확인코드
var newCode = '';              // 신규 코드(최초 설정)
var session = { name:'', code:'', pageId:'' };   // 로그인 후 보관 (영어/받아쓰기 모두 조회용)
var examMeta = { exam1:{label:'영어 시험', kind:'영어 시험 결과'}, exam2:{label:'받아쓰기', kind:'받아쓰기 결과'} };
var cacheResult = {};          // tab -> studentInfo (재조회 캐시)

/* =========================================================
   백엔드 어댑터
   - Apps Script 안에서 열리면 google.script.run 사용
   - GitHub Pages에서 열리면 기존 Apps Script 배포 URL을 JSONP로 호출
========================================================= */
var SCORE_API_URL = 'https://script.google.com/macros/s/AKfycbxlX0fc3nSvZE2JmWNNyaG7zQ-BKvUfMGmRdO3qhSmm_mv7lxLJhE_fKMvbeLLF5-Jd/exec';
var HAS_GS = (typeof google !== 'undefined' && google.script && google.script.run);

function gs(fn){
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject){
    if (HAS_GS){
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(google.script.run, args);
    } else {
      callScoreApi_(fn, args).then(resolve).catch(function(err){
        if (MOCK[fn]) MOCK[fn](resolve, reject, args);
        else reject(err);
      });
    }
  });
}

function callScoreApi_(fn, args){
  var params = {};
  if (fn === 'getStudentList') {
    params = { dbType: args[0] };
  } else if (fn === 'getStudentData') {
    params = { name: args[0], password: args[1], dbType: args[2] };
  } else if (fn === 'updatePassword') {
    params = { pageId: args[0], newPassword: args[1], dbType: args[2] };
  } else if (fn === 'saveParentPushSubscription') {
    params = { name: args[0], password: args[1], dbType: args[2], subscriptionJson: args[3] };
  } else if (fn === 'sendParentPushTest') {
    params = { name: args[0], password: args[1], dbType: args[2] };
  } else {
    return Promise.reject(new Error('지원하지 않는 기능: ' + fn));
  }

  return new Promise(function(resolve, reject){
    var callbackName = '__scoreCb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    var script = document.createElement('script');
    var query = new URLSearchParams(Object.assign({}, params, {
      api: fn,
      callback: callbackName
    }));
    var timer = setTimeout(function(){
      cleanup();
      reject(new Error('서버 응답 시간이 초과되었습니다.'));
    }, 30000);

    function cleanup(){
      clearTimeout(timer);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('성적 조회 서버를 불러오지 못했습니다.'));
    };
    script.src = SCORE_API_URL + '?' + query.toString();
    document.body.appendChild(script);
  });
}

/* ---- 미리보기용 샘플 데이터 ---- */
var MOCK = (function(){
  var DB = {
    exam1: {
      '김민준': {pw:'1234', isFirst:false, sessions:[
        {date:'6월 5일', score:80, redone:false, wrong:[{mine:'I have to cats.',correct:'I have two cats.'},{mine:'The sky is blue todays.',correct:'The sky is blue today.'}]},
        {date:'6월 3일', score:90, redone:true,  wrong:[{mine:'We plays soccer after school.',correct:'We play soccer after school.'}]},
        {date:'5월 29일', score:100, redone:true, wrong:[]}
      ]},
      '이서연': {pw:'1234', isFirst:false, sessions:[
        {date:'6월 5일', score:100, redone:true, wrong:[]},
        {date:'6월 3일', score:90, redone:true,  wrong:[{mine:'He run fast.',correct:'He runs fast.'}]}

function formatScore(score){

  return {num:text, unit:''};
}

/* 문자 단위 비교: 공통 앞/뒤를 제외한 다른 부분만 반환 */
function diffParts(a,b){
  var min=Math.min(a.length,b.length);
  var p=0; while(p<min && a[p]===b[p]) p++;
  var s=0; while(s<min-p && a[a.length-1-s]===b[b.length-1-s]) s++;
  return { a:[a.slice(0,p), a.slice(p,a.length-s), a.slice(a.length-s)],
           b:[b.slice(0,p), b.slice(p,b.length-s), b.slice(b.length-s)] };
}
function diffHtml(mine, correct){
  var d=diffParts(mine, correct);
  var mid=d.a[1] ? '<span class="bad-mine">'+escapeHtml(d.a[1])+'</span>' : '<span class="miss"></span>';
  return {
    mine: escapeHtml(d.a[0])+mid+escapeHtml(d.a[2]),
    correct: escapeHtml(d.b[0])+'<span class="bad-correct">'+escapeHtml(d.b[1])+'</span>'+escapeHtml(d.b[2])
  };
}

  b.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C5C3C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>알림 켜짐';
}

async function enableParentScorePush(studentName, password, dbType){
  if(!studentName || !password || !dbType){ toast('학생 이름, 확인코드, 시험 종류가 필요합니다.'); return; }
  if(!scorePushSupported()){
    alert('이 기기에서는 푸시 알림을 지원하지 않습니다.\n아이폰은 iOS 16.4 이상에서 홈화면에 추가한 뒤 실행해야 합니다.'); return;
  }
  try{
    var permission=await Notification.requestPermission();
    if(permission!=='granted'){ alert('알림 권한을 허용해야 성적 알림을 받을 수 있습니다.'); return; }
    var registration=await getScorePushRegistration();
    var subscription=await registration.pushManager.getSubscription();
    if(!subscription){
      subscription=await registration.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:scoreUrlBase64ToUint8Array(SCORE_PUSH_PUBLIC_KEY) });
    }
    var result = await gs('saveParentPushSubscription', studentName, password, dbType, JSON.stringify(subscription));
    if(result && result.success===false){ toast(result.message || '푸시 등록에 실패했습니다.'); return; }
    markPushOn(); toast('성적 푸시 알림이 켜졌습니다.');
  }catch(error){ toast('푸시 등록 중 오류: '+error.message); }
}
function testParentScorePush(studentName, password, dbType){
  if(!studentName || !password || !dbType){ toast('학생 이름, 확인코드, 시험 종류가 필요합니다.'); return; }
  gs('sendParentPushTest', studentName, password, dbType)
    .then(function(result){
      if(result && result.success===false){ toast(result.message || '테스트 푸시 전송에 실패했습니다.'); return; }
      toast('테스트 푸시를 보냈습니다. 알림센터를 확인하세요.');
    })
    .catch(function(error){ toast('테스트 푸시 오류: '+error.message); });
}
function enableLoggedInParentScorePush(){ enableParentScorePush(session.name, session.code || code, resultTab); }
function testLoggedInParentScorePush(){ testParentScorePush(session.name, session.code || code, resultTab); }
